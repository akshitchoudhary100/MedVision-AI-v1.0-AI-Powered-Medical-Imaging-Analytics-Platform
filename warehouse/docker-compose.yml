services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "StrongPass@123"
      MSSQL_PID: "Developer"

    ports:
      - "1433:1433"

    volumes:
      - medvision_sql_data:/var/opt/mssql

    restart: unless-stopped

volumes:
  medvision_sql_data: